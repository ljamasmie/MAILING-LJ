name: Actualizar Dashboard KAM on: schedule: # Lunes a viernes 8:00 AM Chile (12:00 UTC) - cron: '0 12 * * 1-5' # Lunes a viernes 2:00 PM Chile (18:00 UTC) - cron: '0 18 * * 1-5' workflow_dispatch: # Boton manual en GitHub jobs: update-dashboard: runs-on: ubuntu-latest permissions: contents: write steps: - name: Checkout repo uses: actions/checkout@v4 - name: Actualizar timestamp en dashboard run: | python3 -c " import re, datetime, subprocess with open('index.html','r') as f: c = f.read() now = datetime.datetime.utcnow() fecha = now.strftime('%d %b %Y %H:%M UTC') c = re.sub(r'id=\"lastUpdate\">[^<]*<', f'id=\"lastUpdate\">{fecha}<', c) with open('index.html','w') as f: f.write(c) print('Actualizado:', fecha) " - name: Commit si hay cambios run: | git config user.email "action@github.com" git config user.name "GitHub Action" git add index.html git diff --staged --quiet || git commit -m "Auto-update $(date +'%Y-%m-%d %H:%M')" git push
