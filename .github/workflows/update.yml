name: Actualizar Dashboard KAM

on:
  schedule:
    - cron: '0 12 * * 1-5'
    - cron: '0 18 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Actualizar fecha
        run: |
          python3 update_date.py

      - name: Commit
        run: |
          git config user.email 'action@github.com'
          git config user.name 'GitHub Action'
          git add index.html
          git diff --staged --quiet || git commit -m 'Auto-update dashboard'
          git push
